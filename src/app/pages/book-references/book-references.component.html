<section class="book-page">
    <header class="book-page__header">
        <h2>Book References</h2>
        <p>Welcome. You can browse public book references on this page.</p>
    </header>

    <div class="book-list">
        <article class="book-card" *ngFor="let ref of references">
            <h3>{{ ref.title }}</h3>
            <p><strong>Author:</strong> {{ ref.author }}</p>
            <p><strong>Topic:</strong> {{ ref.topic }}</p>
        </article>
    </div>

    <button class="book-page__back-btn" (click)="onBackHome()">Back Home</button>
</section>
