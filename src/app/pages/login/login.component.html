<div class="form-page">
  <button class="back-home-btn" (click)="onBackHome()" title="Back to Home">
    <span class="material-icons">home</span>
  </button>
  
  <h2>Login Form</h2>

  <app-user-form
    [fields]="loginFields"
    [submitLabel]="'Login'"
    [resetLabel]="'Clear'"
    (formSubmit)="onSubmit($event)">
  </app-user-form>

  <div class="actions">
    <button (click)="onRegisterIfNotRegistered()">Not registered? Register</button>
  </div>
</div>
