<div class="form-page">
  <h2>Update User Form</h2>

  <app-user-form
    [fields]="updateUserFields"
    [initialData]="userData"
    [submitLabel]="'Update'"
    [resetLabel]="'Clear'"
    (formSubmit)="onSubmit($event)">
  </app-user-form>

  <div class="actions">
    <button (click)="onPreviousPage()" title="Back to previous page" class="button button-back">
      <span class="material-icons" aria-hidden="true">arrow_back</span>
      Back
    </button>
  </div>
</div>
