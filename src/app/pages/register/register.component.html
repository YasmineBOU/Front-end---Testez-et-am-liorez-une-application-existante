<div class="form-page">
  <button class="back-home-btn" (click)="onBackHome()" title="Back to Home">
    <span class="material-icons">home</span>
  </button>
  
  <h2>Register Form</h2>

  <app-user-form
    [fields]="registerFields"
    [submitLabel]="'Register'"
    [resetLabel]="'Clear'"
    (formSubmit)="onSubmit($event)">
  </app-user-form>

  <div class="actions">
    <button (click)="onLoginIfAlreadyRegistered()">Already registered? Login</button>
  </div>
</div>
